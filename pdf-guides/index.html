<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Guides</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
    :root {
      --red:#c8102e; --red-dark:#8c0b1f; --red-light:#fdeaed;
      --bg:#f4f5f7; --panel:#fff; --text:#1a1a1a; --muted:#6b7280;
      --border:#e2e4e9; --accent:#0057a8; --shadow:0 2px 12px rgba(0,0,0,.08); --r:10px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); line-height:1.7; }
    .site-header { background:linear-gradient(135deg,var(--red-dark),var(--red) 60%,#e63050); color:#fff; padding:40px; }
    .hdr-title { font-size:clamp(24px,4vw,38px); font-weight:900; line-height:1.2; }
    .hdr-sub { margin-top:10px; opacity:.88; max-width:900px; }
    .main { max-width:1100px; margin:0 auto; padding:36px 24px 60px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:var(--r); padding:20px 24px; margin:14px 0; box-shadow:var(--shadow); }
    .h1 { font-size:26px; font-weight:900; color:var(--red-dark); border-bottom:3px solid var(--red); padding-bottom:10px; margin-bottom:22px; }
    .guide-link { display:block; text-decoration:none; color:inherit; }
    .guide-title { font-size:18px; font-weight:700; color:var(--accent); }
    .guide-meta { margin-top:6px; color:var(--muted); font-size:14px; }
  </style>
</head>
<body>
  <div class="site-header">
    <div class="hdr-title">PDF Guides</div>
    <div class="hdr-sub">기존 루트 문서와 분리된 새 관리 경로입니다. PDF별 폴더, 개별 자산, 페이지 단위 검증 기준으로 운영합니다.</div>
  </div>
  <main class="main">
    <div class="h1">Guide List</div>
    <div class="card">
      <a class="guide-link" href="./nulink_debug_adapter/index.html">
        <div class="guide-title">UM Nuvoton Nu-Link Debug Adapter KR Guide</div>
        <div class="guide-meta">기준 템플릿 문서. 별도 자산 폴더와 독립 배포 경로를 사용합니다.</div>
      </a>
    </div>
  </main>
</body>
</html>
