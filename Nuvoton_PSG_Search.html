<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Nuvoton PSG 검색 (2026)</title>
<style>
  :root {
    --tbl-sticky-top: 0px;
    --tbl-head-row1-h: 28px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
         color: #1f2937; background: #f8fafc; line-height: 1.5; }
  header { background: #0f172a; color: #fff; padding: 14px 24px;
           display: flex; align-items: center; justify-content: flex-end; gap: 14px; position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; cursor: pointer; text-align:right; }
  header .breadcrumb { display:none; color: #94a3b8; font-size: 0.9rem; }
  header .breadcrumb a { color: #60a5fa; text-decoration: none; cursor: pointer; }
  header .stats { display:none; margin-left: auto; font-size: 0.8rem; color: #94a3b8; }
  main { padding: 20px 24px 40px; max-width: 1600px; margin: 0 auto; }

  /* ---- Main category grid ---- */
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
  .cat-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 22px;
              cursor: pointer; transition: all .15s; text-decoration: none; color: inherit; display: block; }
  .cat-card:hover { border-color: #3b82f6; box-shadow: 0 4px 16px rgba(59,130,246,.15); transform: translateY(-2px); }
  .cat-card h2 { margin: 0 0 6px; font-size: 1.3rem; color: #1e40af; }
  .cat-card .count { font-size: 0.85rem; color: #64748b; margin-bottom: 10px; }
  .cat-card .subs { font-size: 0.8rem; color: #475569; }
  .cat-card .sub-tag { display: inline-block; background: #eff6ff; color: #1e40af;
                       padding: 2px 8px; border-radius: 10px; margin: 2px 4px 2px 0; font-size: 0.72rem; }

  /* ---- Category view ---- */
  .toolbar { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; }
  .toolbar .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .toolbar input[type=search] { flex: 1; min-width: 220px; padding: 10px 14px; font-size: 1rem;
                                border: 1.5px solid #cbd5e1; border-radius: 8px; outline: none; }
  .toolbar input[type=search]:focus { border-color: #3b82f6; }
  .toolbar label { font-size: 0.85rem; color: #475569; display: flex; align-items: center; gap: 4px; }
  .toolbar .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .chip { font-size: 0.78rem; padding: 5px 11px; border: 1px solid #cbd5e1;
          border-radius: 14px; background: #fff; cursor: pointer; user-select: none; }
  .chip.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .chip.sub { border-color: #8b5cf6; color: #6d28d9; }
  .chip.sub.active { background: #8b5cf6; color: #fff; }
  /* 스마트 검색 */
  .search-hint { font-size:0.75rem; color:#94a3b8; margin-top:6px; padding:0 2px; }
  .search-hint code { background:#f1f5f9; padding:1px 5px; border-radius:4px; color:#475569; font-size:0.74rem; }
  .kw-btn {
    border: 1px solid #cbd5e1;
    background: #f1f5f9;
    color: #475569;
    font-size: 0.74rem;
    border-radius: 4px;
    padding: 1px 6px;
    cursor: pointer;
    margin-right: 4px;
  }
  .kw-btn:hover { border-color: #3b82f6; color: #1e40af; background: #eff6ff; }
  .filter-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .filter-tag { display:flex; align-items:center; gap:4px; background:#dbeafe; color:#1e40af;
                border:1px solid #93c5fd; border-radius:12px; padding:3px 10px; font-size:0.78rem; }
  .filter-tag button { background:none; border:none; cursor:pointer; color:#1e40af;
                       font-size:0.85rem; line-height:1; padding:0 0 0 2px; }

  .table-wrap {
    overflow-x: auto;
    overflow-y: auto;
    max-height: calc(100vh - 220px);
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    background: #fff;
  }
  /* 테이블 자체 스크롤바 숨김 — 하단 고정바로 대체 */
  .table-wrap::-webkit-scrollbar { height: 0; }
  .table-wrap { scrollbar-width: none; }
  /* 뷰포트 하단 고정 스크롤바 */
  #fixed-hscroll {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 14px; overflow-x: auto; overflow-y: hidden;
    background: rgba(241,245,249,0.97);
    border-top: 1px solid #cbd5e1;
    z-index: 50; display: none;
  }
  #fixed-hscroll-inner { height: 1px; }
  table.results { border-collapse: collapse; font-size: 0.78rem; width: 100%; }
  table.results thead tr:first-child th {
    position: sticky;
    top: var(--tbl-sticky-top);
    z-index: 9;
  }
  table.results thead tr:nth-child(2) th {
    position: sticky;
    top: calc(var(--tbl-sticky-top) + var(--tbl-head-row1-h));
    z-index: 8;
  }
  table.results td {
    padding: 5px 5px; border-bottom: 1px solid #e2e8f0;
    text-align: center; vertical-align: middle;
    white-space: nowrap; width: 38px; min-width: 38px;
  }
  /* 그룹 헤더 행 (1행) */
  table.results th.th-group {
    background: #cbd5e1; color: #1e293b; font-size: 0.72rem; font-weight: 700;
    text-align: center; padding: 5px 4px; white-space: nowrap; border: 1px solid #b0bec5;
  }
  /* Part No. — 양 행 rowspan */
  table.results th.th-pn {
    background: #7c8fa8; color: #fff; font-size: 0.85rem; font-weight: 700;
    text-align: left; padding: 6px 10px; white-space: nowrap;
    min-width: 150px; width: 150px; vertical-align: middle; border: 1px solid #b0bec5;
  }
  /* 개별 컬럼 헤더 행 (2행) — 세로 텍스트 */
  table.results th.th-col {
    background: #f1f5f9; color: #334155; font-size: 0.69rem; font-weight: 600;
    padding: 0; border: 1px solid #e2e8f0; cursor: default;
    width: 38px; min-width: 38px; vertical-align: bottom;
  }
  table.results th.th-col .vc {
    display: block;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    white-space: nowrap;
    padding: 6px 10px 6px 6px;
  }
  table.results td.pn { font-weight: 600; color: #1e40af; text-align: left;
                        white-space: nowrap; min-width: 150px; width: 150px; padding: 5px 10px; }
  table.results td.dash { color: #b0b8c4; }
  table.results td.hit-col { background: #fef9c3; font-weight: 700; color: #92400e; }
  table.results td mark { background: #fde68a; color: #78350f; font-weight: 700; border-radius: 2px; padding: 0 1px; }
  table.results td.fav-cell { width:28px; min-width:28px; padding:0; text-align:center; }
  .fav-btn { background:none; border:none; cursor:pointer; font-size:1rem; line-height:1;
             padding:3px; border-radius:4px; transition:transform .1s; }
  .fav-btn:hover { transform:scale(1.3); }
  .fav-btn.on { color:#ef4444; }
  .fav-btn.off { color:#cbd5e1; }
  table.results td.pg { font-size: 0.69rem; color: #94a3b8; white-space: nowrap; width: 50px; }
  table.results tr { cursor: pointer; }
  table.results tbody tr:hover { background: #eff6ff; }
  .empty { text-align: center; padding: 40px; color: #94a3b8; }

  /* ---- Detail modal ---- */
  .modal { position: fixed; inset: 0; background: rgba(15,23,42,.6); display: none;
           align-items: center; justify-content: center; z-index: 20; padding: 20px; }
  .modal.open { display: flex; }
  .modal-body { background: #fff; border-radius: 12px; max-width: 1000px; width: 100%;
                max-height: 92vh; overflow-y: auto; padding: 24px 28px; }
  .modal-body h3 { margin: 0 0 4px; color: #1e40af; font-size: 1.2rem; }
  .modal-body .meta { color: #64748b; font-size: 0.82rem; margin-bottom: 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .modal-body .src { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
  .modal-body .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; }
  .modal-body .spec-row { display: contents; }
  .modal-body .spec-row .sk { background: #f8fafc; padding: 6px 10px; font-size: 0.82rem; font-weight: 500; color: #475569; border-bottom: 1px solid #f1f5f9; }
  .modal-body .spec-row .sv { padding: 6px 10px; font-size: 0.82rem; color: #1f2937; border-bottom: 1px solid #f1f5f9; }
  .modal-body .spec-row .sv.dash { color: #cbd5e1; }
  .modal-body .sv input.edit-input {
    width: 100%;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    font-size: 0.8rem;
    padding: 4px 6px;
    background: #fff;
    color: #0f172a;
  }
  .modal-body .sv .edit-note {
    display: block;
    margin-top: 3px;
    color: #94a3b8;
    font-size: 0.7rem;
  }
  @media(max-width:640px){ .modal-body .spec-grid { grid-template-columns: 1fr; } }
  .modal-body .close { float: right; background: #e2e8f0; border: 0; padding: 6px 14px;
                       border-radius: 6px; cursor: pointer; font-size: 0.85rem; margin-bottom: 6px; }

  .footer { text-align: center; color: #94a3b8; font-size: 0.75rem; padding: 20px 0 0; }
</style>
</head>
<body>

<header>
  <h1 id="home-link">🔎 Nuvoton PSG 2026</h1>
  <span class="breadcrumb" id="breadcrumb"></span>
  <span class="stats" id="stats"></span>
</header>

<main id="app"></main>
<div id="fixed-hscroll"><div id="fixed-hscroll-inner"></div></div>

<div class="modal" id="modal">
  <div class="modal-body" id="modal-body"></div>
</div>

<div class="footer">출처: NuvotonPSG.pdf · 전체 데이터는 원본 PDF에서 직접 추출됨 (find_tables layout parser)</div>

<script>
let DATA = [];

async function loadData() {
  const res = await fetch('./psg_data_cleaned.json', { cache: 'no-store' });
  if (!res.ok) throw new Error(`psg_data_cleaned.json load failed: ${res.status}`);
  DATA = await res.json();
}
function normalizeData() {
DATA.forEach(row => {
  const coreVal = String(row.Core || '').trim();
  const cpuVal = String(row.CPU || '').trim();
  const pnVal = String(row['Part No.'] || '').trim().toUpperCase();

  // Prefer one canonical field for display/search in MCU tables.
  if (!coreVal && cpuVal) row.Core = cpuVal;

  // Infer missing Core from subcategory/series labels (e.g., Cortex-M4, Cortex-M4F).
  if (!String(row.Core || '').trim()) {
    const sub = String(row._subcategory || '');
    const ser = String(row._series || '');
    const mSub = sub.match(/Cortex-[A-Za-z0-9+]+/i);
    const mSer = ser.match(/Cortex-[A-Za-z0-9+]+/i);
    if (mSub) row.Core = mSub[0];
    else if (mSer) row.Core = mSer[0];
  }

  // Final fallback for known part-number families when metadata is generic
  // (e.g., _subcategory='Automotive' with missing Core/CPU fields).
  if (!String(row.Core || '').trim()) {
    if (pnVal.startsWith('M2A23')) row.Core = 'Cortex-M23';
  }
});
}

let localJsonHandle = null;
let saveStatus = '미연결';
let saveStatusErr = false;
let saveTimer = null;
let savingNow = false;

function setSaveStatus(text, isError = false) {
  saveStatus = text;
  saveStatusErr = isError;
}

function supportsLocalFileWrite() {
  return typeof window.showOpenFilePicker === 'function';
}

async function connectLocalJson() {
  if (!supportsLocalFileWrite()) {
    alert('이 브라우저는 로컬 파일 직접 저장을 지원하지 않습니다. Chrome/Edge 최신 버전을 사용해주세요.');
    return;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      multiple: false,
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
      excludeAcceptAllOption: false,
    });
    if (!handle) return;
    const file = await handle.getFile();
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (!Array.isArray(parsed)) throw new Error('JSON root is not an array');
    DATA = parsed;
    normalizeData();
    localJsonHandle = handle;
    setSaveStatus(`연결됨: ${file.name}`);
    if (state.cat) renderCategory(state.cat); else renderHome();
  } catch (err) {
    console.error(err);
    setSaveStatus('연결 실패', true);
    alert('로컬 JSON 연결 실패. psg_data_cleaned.json 파일을 선택해주세요.');
    if (state.cat) renderCategory(state.cat); else renderHome();
  }
}

function scheduleLocalSave() {
  if (!localJsonHandle) return;
  if (saveTimer) clearTimeout(saveTimer);
  setSaveStatus('저장 대기...');
  saveTimer = setTimeout(() => { void saveLocalJsonNow(); }, 400);
}

async function saveLocalJsonNow() {
  if (!localJsonHandle) return;
  if (savingNow) return;
  savingNow = true;
  try {
    const writable = await localJsonHandle.createWritable();
    await writable.write(JSON.stringify(DATA, null, 2));
    await writable.close();
    setSaveStatus(`저장됨 ${new Date().toLocaleTimeString()}`);
  } catch (err) {
    console.error(err);
    setSaveStatus('저장 실패', true);
  } finally {
    savingNow = false;
    if (state.cat) renderCategory(state.cat);
  }
}

// Top-level category order
const CATS = [
  { id: 'MCU',     name: 'MCU',       desc: '8051 · Cortex-M0/M23/M4/M7 · Automotive' },
  { id: 'MPU',     name: 'MPU',       desc: 'Cortex-A35 · Arm9' },
  { id: 'Audio',   name: 'Audio',     desc: 'PowerSpeech · ChipCorder · DAC/Amp 등',  hidden: true },
  { id: 'Cloud',   name: 'Cloud Computing', desc: 'HW Monitoring IC',                 hidden: true },
  { id: 'Battery', name: 'Battery & Automotive', desc: 'Battery Monitoring',          hidden: true },
  { id: 'MOSFET',  name: 'MOSFET',    desc: 'Li-ion Protection · Charging',           hidden: true },
  { id: 'Motor',   name: 'Motor',     desc: 'Motor Driver · Power Control',           hidden: true },
  { id: 'Power',   name: 'Power',     desc: 'Power Management IC',                    hidden: true },
  { id: 'Sensor',  name: 'Sensor',    desc: 'Image Sensor',                           hidden: true },
  { id: 'Laser',   name: 'Laser',     desc: 'Laser Diode',                            hidden: true },
  { id: 'Analog',  name: 'Analog',    desc: 'Analog ICs',                             hidden: true },
];

// Columns to show in results table (in priority order). All columns visible via click→detail.
const PREFERRED = {
  MCU: [
    'Part No.','Core','Operating Frequency (MHz)',
    'APROM Flash (KB)','SRAM (KB)',
    'GPIO','UART','SPI','I²C','CAN FD','USB',
    'ADC (12-bit)','PWM (16-bit)','RTC','Touch Key',
    'Operating Voltage (min) (V)','Operating Voltage (max) (V)',
    'Package Type','Package Size'
  ],
  MPU: [
    'Part No.','Core','Real-Time Processor (RTP)','Operating Frequency (MHz)',
    'GPIO','SRAM (KB)','DDR(MB)','DDR (MB)','MCP DDR',
    'Low-power UART (LPUART)','UART','Quad SPI (QSPI)',
    'I²C','CAN FD',
    'USB HS Host','USB HS Device/ Host',
    'Ethernet 10/100 Mbps','Ethernet 10/100/1000 Mbps',
    'Camera Interface','TFT-LCD Interface','2D Graphics Engine',
    'Trusted Secure Island (TSI)',
    'Package','Package Type','Package Size','Mass Production'
  ],
  Audio: ['Part No.','Description','Sample Rate (KHz)','Duration (Under 8KHz)','Operating Voltage (V)','Power Output (W)'],
  Battery: ['Part No.','Description','Operating Voltage (V)','Package'],
  MOSFET: ['Part No.','Type','VSS [V]','VGS [V]','IS*1 [A]','Rss(on)Typ.[mΩ]','Package Size'],
  Motor: ['Part No.','Description','Operating Voltage (V)','Package'],
  Power: ['Part No.','Description','Operating Voltage (V)','Package'],
  Sensor: ['Part No.','Description','Resolution','Package'],
  Laser: ['Part No.','Description','Wavelength','Power','Package'],
  Cloud: ['Part No.','Description','Operating Voltage (V)','Package'],
  Analog: ['Part No.','Description','Package'],
};

const META_KEYS = new Set(['_category','_subcategory','_source_page','_series']);

// Canonical column -> alternative keys observed across series/tables
const COL_FALLBACKS = {
  'Core': ['CPU'],
  'GPIO': ['GPIO (pin)', 'GPIOs'],
  'Operating Voltage (min) (V)': ['Operating Voltage (min)', 'Operating Voltage (min)(V)', 'Operating Voltage(min)(V)'],
  'Operating Voltage (max) (V)': ['Operating Voltage (max)', 'Operating Voltage (max)(V)', 'Operating Voltage(max)(V)'],
  'Operating Temperature (Tj, min)(°C)': ['Operating Temperature (min)', 'Operating Temperature (min)(°C)'],
  'Operating Temperature (Tj, max)(°C)': ['Operating Temperature (max)', 'Operating Temperature (max)(°C)'],
  'LDROM Flash (KB)': ['LDROM Flash', 'LDROM Flash(KB)'],
  'APROM Flash (KB)': ['APROM Flash(KB)', 'APROM Flash', 'APROM Flash (KB))'],
  'Data Flash (KB)': ['Data Flash(KB)'],
  'SRAM (KB)': ['SRAM', 'SRAM(KB)', 'SRAM (MB)', 'SRAM(MB)'],
  'PDMA (ch)': ['PDMA(ch)', 'PDMA (CH)', 'PDMA'],
  'Timer (16-bit)': ['Timer(16-bit)'],
  'Timer (32-bit)': ['Timer(32-bit)'],
  'I²C': ['I2C', 'I��C'],
  'SPI/ I²S': ['SPI/I²S', 'SPI/I��S'],
  'ISO-7816-3': ['ISO-7816'],
  'SPROM (Byte)': ['SPROM(B)'],
  'XOM (KB)': ['XOM'],
  'TRNG': ['True Random Number Generator (TRNG)'],
  'DDR(MB)': ['DDR (MB)'],
  'DDR (MB)': ['DDR(MB)'],
  'Secure Digital Host Controller (SDHC)': ['SDHC'],
  'USB HS Device/ Host': ['USB HS Device'],
  'Quad SPI (QSPI)': ['Quad SPI'],
  'Package': ['Package Type'],
  'Package Type': ['Package'],
};

function isBlankCell(v) {
  if (v === undefined || v === null) return true;
  const s = String(v).trim();
  return s === '' || s === '-' || s === '—';
}

function getFieldValue(row, col) {
  const direct = row[col];
  if (!isBlankCell(direct)) return direct;
  const alts = COL_FALLBACKS[col] || [];
  for (const alt of alts) {
    const v = row[alt];
    if (!isBlankCell(v)) return v;
  }
  return direct;
}

function colFingerprint(name) {
  return String(name || '')
    .replace(/²/g, '2')
    .replace(/��/g, '2')
    .replace(/μ|µ/g, 'u')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '');
}

// ── Favorites (localStorage) ──
let FAVS = new Set(JSON.parse(localStorage.getItem('psg_favs') || '[]'));
function saveFavs() { localStorage.setItem('psg_favs', JSON.stringify([...FAVS])); }
function toggleFav(e, pn) {
  e.stopPropagation();
  if (FAVS.has(pn)) FAVS.delete(pn); else FAVS.add(pn);
  saveFavs();
  const btn = e.currentTarget;
  btn.textContent = FAVS.has(pn) ? '❤' : '♡';
  btn.className = 'fav-btn ' + (FAVS.has(pn) ? 'on' : 'off');
  if (state.showFav) renderResults();
}

// ── Smart Search ──
const SEARCH_ALIASES = {
  'core':     ['Core'],
  'cpu':      ['Core', 'CPU'],
  'adc':      ['ADC (12-bit)', 'ADC (10-bit)', 'Enhanced ADC (EADC)(12-bit)'],
  'uart':     ['UART', 'Low-power UART (LPUART)'],
  'spi':      ['SPI', 'Quad SPI (QSPI)', 'SPI/ I²S'],
  'i2c':      ['I²C', 'I2C'],
  'can':      ['CAN', 'CAN FD'],
  'usb':      ['USB', 'USB HS Host', 'USB HS Device/ Host'],
  'flash':    ['APROM Flash (KB)'],
  'sram':     ['SRAM (KB)'],
  'gpio':     ['GPIO'],
  'freq':     ['Operating Frequency (MHz)'],
  'pwm':      ['PWM (16-bit)', 'PWM (10-bit)', 'Enhanced PWM (EPWM) (16-bit)'],
  'timer':    ['Timer (16-bit)', 'Timer/PWM'],
  'pdma':     ['PDMA (ch)', 'PDMA(ch)'],
  'ddr':      ['DDR(MB)', 'DDR (MB)', 'MCP DDR'],
  'ethernet': ['Ethernet 10/100 Mbps', 'Ethernet 10/100/1000 Mbps'],
  'eth':      ['Ethernet 10/100 Mbps', 'Ethernet 10/100/1000 Mbps'],
  'lcd':      ['ComSeg LCD', 'TFT-LCD Interface'],
  'qspi':     ['Quad SPI (QSPI)'],
  'trng':     ['TRNG'],
  'acmp':     ['ACMP'],
  'touch':    ['Touch Key'],
  'rtc':      ['RTC'],
};
const SEARCH_HINT_KEYS = ['adc', 'uart', 'spi', 'i2c', 'can', 'usb', 'flash', 'sram', 'gpio', 'freq', 'pwm', 'timer'];

// Parse query string into structured filters + remaining free text
// Supports: "ADC 8", "ADC>=8", "ADC=8", "Flash>=128 UART>=2"
function parseQuery(rawQ) {
  const tokens = rawQ.trim().split(/\s+/).filter(Boolean);
  const filters = [];
  const textParts = [];
  let i = 0;
  while (i < tokens.length) {
    const tok = tokens[i];
    // Pattern A: "ADC>=8" or "Flash:128" — all in one token
    const mA = tok.match(/^([a-zA-Z0-9_]+)(>=|<=|>|<|=|:)(\d+\.?\d*)$/i);
    if (mA) {
      const alias = SEARCH_ALIASES[mA[1].toLowerCase()];
      if (alias) {
        filters.push({ cols: alias, op: mA[2] === ':' ? '>=' : mA[2], value: parseFloat(mA[3]), raw: tok });
        i++; continue;
      }
    }
    // Pattern B: "ADC 8" or "ADC 8채널" — keyword then number token
    if (i + 1 < tokens.length) {
      const alias = SEARCH_ALIASES[tok.toLowerCase()];
      const numM = tokens[i + 1].match(/^(\d+\.?\d*)/);
      if (alias && numM) {
        filters.push({ cols: alias, op: '>=', value: parseFloat(numM[1]), raw: tok + '>=' + numM[1] });
        i += 2; continue;
      }
    }
    textParts.push(tok);
    i++;
  }
  return { filters, text: textParts.join(' ') };
}

function matchesFilter(r, f) {
  for (const col of f.cols) {
    const v = getFieldValue(r, col);
    if (isBlankCell(v)) continue;
    const m = String(v).match(/^(\d+\.?\d*)/);
    if (!m) { // non-numeric: check presence for = operator
      if (f.op === '=' && parseFloat(m) === f.value) return true;
      if ((f.op === '>=' || f.op === '>') && String(v) !== '-') return true;
      continue;
    }
    const num = parseFloat(m[1]);
    if (f.op === '>='  && num >= f.value) return true;
    if (f.op === '<='  && num <= f.value) return true;
    if (f.op === '>'   && num >  f.value) return true;
    if (f.op === '<'   && num <  f.value) return true;
    if ((f.op === '=' || f.op === ':') && num === f.value) return true;
  }
  return false;
}

function opLabel(op) {
  return { '>=':'≥', '<=':'≤', '>':'>', '<':'<', '=':'=', ':':'≥' }[op] || op;
}

function buildGroupedHead(groups, allKeys, rows) {
  // Filter cols: must exist in data AND have at least one non-empty value in current rows
  const hasValue = c => rows.some(r => {
    const v = getFieldValue(r, c);
    return !isBlankCell(v);
  });
  // Within each group, deduplicate by fingerprint - keep first variant with a value,
  // so listing e.g. 'SRAM (KB)','SRAM','SRAM(KB)' results in only the first that has data.
  const seenFp = new Set();
  const deduped = groups.map(g => {
    const cols = [];
    for (const c of g.cols) {
      const fp = colFingerprint(c);
      if (!seenFp.has(fp) && hasValue(c)) {
        seenFp.add(fp);
        cols.push(c);
      }
    }
    return { ...g, cols };
  }).filter(g => g.cols.length > 0);
  const active = deduped;
  // Add unmatched raw columns as their own group so differently named fields are not hidden.
  // Exclude meaningless auto-generated keys like col_9, col_10, etc.
  const SKIP_KEY_RE = /^col_\d+$/i;
  const represented = new Set(active.flatMap(g => g.cols).map(colFingerprint));
  const extraCols = [...allKeys]
    .filter(c => c !== 'Part No.' && hasValue(c) && !represented.has(colFingerprint(c)) && !SKIP_KEY_RE.test(c))
    .sort((a, b) => a.localeCompare(b));
  if (extraCols.length > 0) active.push({ label: '기타', cols: extraCols });
  // Flat ordered col list
  const flatCols = active.flatMap(g => g.cols);
  // Row 1: ♡(rowspan2) + Part No. (rowspan2) + group labels (colspan) + 출처 (rowspan2)
  const tr1 = `<th rowspan="2" style="width:28px;min-width:28px;background:#7c8fa8;border:1px solid #b0bec5;"></th>`
    + `<th class="th-pn" rowspan="2">Part No.</th>`
    + active.map(g => `<th class="th-group" colspan="${g.cols.length}">${esc(g.label)}</th>`).join('')
    + `<th class="th-pn" rowspan="2" style="min-width:50px;width:50px;text-align:center">출처</th>`;
  // Row 2: individual col headers (rotated)
  const tr2 = flatCols.map(c =>
    `<th class="th-col" title="${esc(c)}"><span class="vc">${esc(shortCol(c))}</span></th>`
  ).join('');
  return { tr1, tr2, flatCols };
}

// Abbreviated column headers for display (full name shown on hover via title=)
function shortCol(c) { return c; }

// Get part identifier (Part No. / Ordering No. / first cell fallback)
function getPN(row) {
  return row['Part No.'] || row['Ordering No.'] || row['Product Line'] || row['Model'] || row['Part Number']
      || Object.entries(row).filter(([k]) => !META_KEYS.has(k))[0]?.[1] || '';
}

  { label: 'UART',      match: r => hasVal(r['UART']) },

  { label: 'CAN',       match: r => Object.keys(r).some(k => k.includes('CAN') && hasVal(r[k])) },
  { label: 'USB',       match: r => Object.keys(r).some(k => k.includes('USB') && hasVal(r[k])) },
  { label: 'LCD',       match: r => Object.keys(r).some(k => /LCD/i.test(k) && hasVal(r[k])) },
  { label: 'Touch Key', match: r => hasVal(r['Touch Key']) },
  { label: 'RTC',       match: r => hasVal(r['RTC']) },
  { label: 'PDMA',      match: r => Object.keys(r).some(k => /PDMA/i.test(k) && hasVal(r[k])) },
  { label: 'Ethernet',  match: r => Object.keys(r).some(k => /Ether/i.test(k) && hasVal(r[k])) },
  { label: 'TrustZone', match: r => Object.keys(r).some(k => /Trust/i.test(k) && hasVal(r[k])) },
];

function hasVal(v) {
  if (isBlankCell(v)) return false;
  const s = String(v).trim();
  return s !== '0';
}

function countByCat(catId) {
  return DATA.filter(r => r._category === catId).length;
}
function subsOf(catId) {
  const s = new Set(DATA.filter(r => r._category === catId).map(r => r._subcategory));
  return [...s];
}

let state = { cat: null, q: '', sub: '', features: new Set(), showFav: false, editMode: false };

function renderCategory(catId) {
  state.cat = catId;
  const cat = CATS.find(c => c.id === catId);
  if (!cat) return renderHome();
  setBreadcrumb(`<a onclick="location.hash='#/'">카테고리</a> / ${esc(cat.name)}`);

  // Compute subs
  const subs = subsOf(catId);
  const subChips = subs.length > 1
    ? subs.map(s => `<span class="chip sub ${state.sub===s?'active':''}" onclick="toggleSub('${esc(s)}')">${esc(s)}</span>`).join('')
    : '';

  const featureChips = (catId === 'MCU')
    ? FEATURES_MCU.map(f => `<span class="chip ${state.features.has(f.label)?'active':''}" onclick="toggleFeat('${f.label}')">${esc(f.label)}</span>`).join('')
    : '';

  const favChip = `<span class="chip ${state.showFav?'active':''}" onclick="toggleShowFav()" style="border-color:#ef4444;color:${state.showFav?'#fff':'#ef4444'};background:${state.showFav?'#ef4444':'#fff'}">❤ 즐겨찾기</span>`;
  const editChip = `<span class="chip ${state.editMode?'active':''}" onclick="toggleEditMode()" style="border-color:#f59e0b;color:${state.editMode?'#fff':'#b45309'};background:${state.editMode?'#f59e0b':'#fff'}">✎ 편집 모드</span>`;
  const connectChip = `<span class="chip" onclick="connectLocalJson()" style="border-color:#16a34a;color:#166534">🔗 로컬 JSON 연결</span>`;
  const statusChip = `<span class="chip" style="border-color:${saveStatusErr ? '#dc2626' : '#94a3b8'};color:${saveStatusErr ? '#b91c1c' : '#334155'};cursor:default">${esc(saveStatus)}</span>`;
  const hintKeys = SEARCH_HINT_KEYS
    .filter(k => SEARCH_ALIASES[k])
    .map(k => `<button type="button" class="kw-btn" onclick='insertHintKeyword(${JSON.stringify(k)})'>${esc(k)}≥N</button>`)
    .join('');
  document.getElementById('app').innerHTML = `
    <div class="toolbar">
      <div class="row">
        <input type="search" id="q" placeholder="검색: MA35D16 ADC>=8 Flash>=128 UART>=2 …" value="${esc(state.q)}">
        ${favChip}${editChip}${connectChip}${statusChip}
      </div>
      <div class="search-hint">키워드: ${hintKeys} &nbsp;·&nbsp; 조합 가능: <code>ADC>=8 Flash>=128 UART>=2</code></div>
      <div id="filter-tags" class="filter-tags"></div>
      ${subs.length > 1 ? `<div class="chips">${subChips}</div>` : ''}
      ${featureChips ? `<div class="chips">${featureChips}</div>` : ''}
    </div>
    <div id="results"></div>
  `;
  document.getElementById('q').addEventListener('input', e => { state.q = e.target.value; renderFilterTags(); renderResults(); });
  renderFilterTags();
  renderResults();
}

function insertHintKeyword(keyword) {
  const token = String(keyword || '').trim();
  if (!token) return;
  const hasToken = new RegExp(`(^|\\s)${token.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}(\\s|$)`, 'i').test(state.q);
  state.q = hasToken ? state.q : (state.q.trim() ? `${state.q.trim()} ${token}` : token);
  const q = document.getElementById('q');
  if (q) {
    q.value = state.q;
    q.focus();
    const n = q.value.length;
    q.setSelectionRange(n, n);
  }
  renderFilterTags();
  renderResults();
}

function renderFilterTags() {
  const el = document.getElementById('filter-tags');
  if (!el) return;
  const { filters } = parseQuery(state.q);
  if (filters.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = filters.map(f => {
    const label = f.cols[0].replace(/ \(.*/, ''); // short col name
    return `<span class="filter-tag">🔍 ${esc(label)} ${opLabel(f.op)} ${f.value}</span>`;
  }).join('');
}

function toggleSub(s) {
  state.sub = (state.sub === s) ? '' : s;
  renderCategory(state.cat);
}
function toggleFeat(f) {
  if (state.features.has(f)) state.features.delete(f);
  else state.features.add(f);
  renderCategory(state.cat);
}
function toggleShowFav() {
  state.showFav = !state.showFav;
  renderCategory(state.cat);
}
function toggleEditMode() {
  state.editMode = !state.editMode;
  renderCategory(state.cat);
}

function renderResults() {
  const rows = filterRows();
  if (rows.length === 0) {
    document.getElementById('results').innerHTML = `<div class="empty">조건에 맞는 Part가 없습니다.</div>`;
    setStats(`0 / ${DATA.filter(r => r._category === state.cat).length} 표시`);
    return;
  }

  // Union of all keys present in filtered rows
  const allKeys = new Set();
  rows.forEach(r => Object.keys(r).forEach(k => { if (!META_KEYS.has(k)) allKeys.add(k); }));

  const groups = GROUPS[state.cat];
  let thead, flatCols;

  if (groups) {
    // ── Grouped 2-row header (PDF style) ──
    const built = buildGroupedHead(groups, allKeys, rows);
    thead = `<tr>${built.tr1}</tr><tr>${built.tr2}</tr>`;
    flatCols = built.flatCols;
  } else {
    // ── Fallback: single-row header ──
    const preferred = (PREFERRED[state.cat] || []).filter(c =>
      rows.some(r => !isBlankCell(getFieldValue(r, c)))
    );
    flatCols = preferred.length >= 3 ? preferred : [...allKeys].slice(0, 12);
    thead = `<tr>
      <th style="width:28px;min-width:28px;background:#7c8fa8;border:1px solid #b0bec5;"></th>
      <th class="th-pn">Part No.</th>
      ${flatCols.map(c=>`<th class="th-col" title="${esc(c)}"><span class="vc">${esc(shortCol(c))}</span></th>`).join('')}
      <th class="th-pn" style="min-width:50px;width:50px;text-align:center">출처</th>
    </tr>`;
  }

  // Build hit-col set: columns targeted by structured filters
  const { filters: activeFilters, text: activeText } = parseQuery(state.q);
  const hitCols = new Set(activeFilters.flatMap(f => f.cols));
  const textQ = activeText.trim().toLowerCase();

  const body = rows.map(r => {
    const sp = Array.isArray(r._source_page) ? r._source_page.join(', ') : r._source_page;
    const pnVal = getPN(r);
    const isFav = FAVS.has(pnVal);
    const tds = flatCols.map(c => {
      const vv = getFieldValue(r, c);
      let raw = (vv === undefined || vv === null || vv === '') ? '-' : vv;
      // If SRAM comes from MB-based source, show explicit unit to avoid KB/MB confusion.
      if (c === 'SRAM (KB)' && isBlankCell(r[c])) {
        const mbVal = !isBlankCell(r['SRAM (MB)']) ? r['SRAM (MB)']
                    : !isBlankCell(r['SRAM(MB)']) ? r['SRAM(MB)']
                    : null;
        if (mbVal !== null) raw = `${mbVal} (MB)`;
      }
      const isDash = (raw === '-' || raw === '—');
      const isHitCol = hitCols.has(c) && !isDash;
      let display = esc(String(raw));
      // Free-text highlight: wrap matching substring with <mark>
      if (!isDash && textQ && String(raw).toLowerCase().includes(textQ)) {
        const re = new RegExp(textQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
        display = esc(String(raw)).replace(re, m => `<mark>${m}</mark>`);
        // esc already ran, so re-apply on raw safely:
        display = String(raw).replace(re, m => `<mark>${esc(m)}</mark>`);
      }
      return `<td class="${isDash?'dash':isHitCol?'hit-col':''}">${display}</td>`;
    }).join('');
    return `<tr onclick="showDetail(${DATA.indexOf(r)})" style="${isFav?'background:#fff5f5':''}">
      <td class="fav-cell"><button class="fav-btn ${isFav?'on':'off'}" onclick="toggleFav(event,'${esc(pnVal)}')" title="즐겨찾기">${isFav?'❤':'♡'}</button></td>
      <td class="pn">${esc(pnVal)}</td>${tds}<td class="pg">p.${sp}</td>
    </tr>`;
  }).join('');

  document.getElementById('results').innerHTML = `
    <div class="table-wrap">
      <table class="results">
        <thead>${thead}</thead>
        <tbody>${body}</tbody>
      </table>
    </div>`;
  setupFixedScrollbar();
  const total = DATA.filter(r => r._category === state.cat).length;
  setStats(`${rows.length} / ${total} 표시`);
}

function filterRows() {
  const { filters, text } = parseQuery(state.q);
  const q = text.trim().toLowerCase();
  return DATA.filter(r => {
    if (r._category !== state.cat) return false;
    if (state.showFav && !FAVS.has(getPN(r))) return false;
    if (state.sub && r._subcategory !== state.sub) return false;
    if (state.features.size > 0) {
      for (const fLabel of state.features) {
        const f = FEATURES_MCU.find(x => x.label === fLabel);
        if (f && !f.match(r)) return false;
      }
    }
    // Structured column filters (AND)
    for (const f of filters) {
      if (!matchesFilter(r, f)) return false;
    }
    // Free text
    if (q) {
      const blob = Object.entries(r)
        .filter(([k]) => !META_KEYS.has(k))
        .map(([,v]) => String(v)).join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

function showDetail(idx) {
  const r = DATA[idx];
  if (!r) return;
  const pn = getPN(r);
  const sp = Array.isArray(r._source_page) ? r._source_page.map(p=>'p.'+p).join(', ') : 'p.'+r._source_page;
  // Build 2-column grid: all fields including '-' values
  const entries = Object.entries(r).filter(([k]) => !META_KEYS.has(k));
  const gridRows = entries.map(([k, v]) => {
    const val = (v === null || v === undefined || v === '') ? '-' : v;
    const isDash = (val === '-' || val === '—');
    const editInput = state.editMode
      ? `<input class="edit-input" value="${escAttr(String(val === '-' ? '' : val))}" onchange="saveFieldByIndex(${idx}, ${JSON.stringify(k)}, this.value)">`
      : esc(String(val));
    const note = state.editMode ? `<span class="edit-note">편집 후 자동 저장(로컬 JSON 연결 필요)</span>` : '';
    return `<div class="spec-row"><div class="sk">${esc(k)}</div><div class="sv${isDash?' dash':''}">${editInput}${note}</div></div>`;
  }).join('');
  document.getElementById('modal-body').innerHTML = `
    <button class="close" onclick="closeModal()">닫기 ✕</button>
    <h3>${esc(pn)}</h3>
    <div class="meta">
      <span>${esc(r._category)} / ${esc(r._subcategory)}</span>
      <span>${esc(r._series||'')}</span>
      <span class="src">📄 NuvotonPSG.pdf · ${sp}</span>
    </div>
    <div class="spec-grid">${gridRows}</div>
  `;
  document.getElementById('modal').classList.add('open');
}
function saveFieldByIndex(idx, key, value) {
  const row = DATA[idx];
  if (!row) return;
  const next = String(value ?? '').trim();
  row[key] = next;
  scheduleLocalSave();
  renderResults();
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escAttr(s) {
  return esc(s).replace(/`/g, '&#96;');
}
function setBreadcrumb(html) { document.getElementById('breadcrumb').innerHTML = html; }
function setStats(s) { document.getElementById('stats').textContent = s; }

// ── 뷰포트 하단 고정 수평 스크롤바 ──
const _hscroll = {
  obs: null, wrap: null,
  onBar:  null, onWrap: null,
  bar:    document.getElementById('fixed-hscroll'),
  inner:  document.getElementById('fixed-hscroll-inner'),
};
function hideFixedScrollbar() {
  if (_hscroll.bar) _hscroll.bar.style.display = 'none';
  if (_hscroll.obs) { _hscroll.obs.disconnect(); _hscroll.obs = null; }
  if (_hscroll.wrap) {
    if (_hscroll.onBar)  _hscroll.bar.removeEventListener('scroll', _hscroll.onBar);
    if (_hscroll.onWrap) _hscroll.wrap.removeEventListener('scroll', _hscroll.onWrap);
    _hscroll.wrap = null;
  }
}
function setupFixedScrollbar() {
  hideFixedScrollbar();
  const wrap = document.querySelector('.table-wrap');
  if (!wrap || !_hscroll.bar) return;
  _hscroll.wrap = wrap;
  _hscroll.inner.style.width = wrap.scrollWidth + 'px';

  _hscroll.onBar  = () => { wrap.scrollLeft = _hscroll.bar.scrollLeft; };
  _hscroll.onWrap = () => { _hscroll.bar.scrollLeft = wrap.scrollLeft; };
  _hscroll.bar.addEventListener('scroll',  _hscroll.onBar);
  wrap.addEventListener('scroll', _hscroll.onWrap);

  // 테이블이 스크롤 필요한 경우에만, 뷰포트 내 있을 때 표시
  _hscroll.obs = new IntersectionObserver(([e]) => {
    _hscroll.bar.style.display =
      (e.isIntersecting && wrap.scrollWidth > wrap.clientWidth) ? 'block' : 'none';
  }, { threshold: 0 });
  _hscroll.obs.observe(wrap);
}

// Router
function route() {
  const h = location.hash || '#/';
  const m = h.match(/^#\/cat\/(\w+)/);
  if (m) {
    state = { cat: m[1], q: '', sub: '', features: new Set(), showFav: false, editMode: false };
    renderCategory(m[1]);
  } else {
    renderHome();
  }
}
window.addEventListener('hashchange', route);
document.getElementById('home-link').onclick = () => location.hash = '#/';

async function bootstrap() {
  const app = document.getElementById('app');
  try {
    if (!supportsLocalFileWrite()) {
      setSaveStatus('브라우저 미지원', true);
    }
    if (app) app.innerHTML = '<div class="empty">데이터 로드 중...</div>';
    await loadData();
    normalizeData();
    route();
  } catch (err) {
    console.error(err);
    if (app) app.innerHTML = '<div class="empty">데이터 로드 실패: psg_data_cleaned.json</div>';
    setStats('데이터 로드 실패');
  }
}

bootstrap();
</script>
